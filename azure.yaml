# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: iqdeepdive-foundryiq-proj
services:
    ai-project-hr-agent-dev:
        project: ""
        host: azure.ai.project
        language: ""
        endpoint: https://ai-account-ozfwepskkverc.services.ai.azure.com/api/projects/ai-project-hr-agent-dev
    hr-agent:
        project: src/hr-agent
        host: azure.ai.agent
        language: python
        uses:
            - ai-project-hr-agent-dev
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AZURE_AI_SEARCH_SERVICE_ENDPOINT
              value: ${AZURE_AI_SEARCH_SERVICE_ENDPOINT}
        kind: hosted
        name: hr-agent
        protocols:
            - protocol: responses
              version: 2.0.0
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: infra/hooks/postdeploy.ps1
            interactive: true
        posix:
            shell: sh
            run: infra/hooks/postdeploy.sh
            interactive: true
    postprovision:
        windows:
            shell: pwsh
            run: infra/hooks/postprovision.ps1
            interactive: true
        posix:
            shell: sh
            run: infra/hooks/postprovision.sh
            interactive: true
