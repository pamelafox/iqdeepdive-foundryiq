# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: iqdeepdive-foundryiq-proj
services:
    agent-foundry-iq-api:
        project: src/agent-foundry-iq-api
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AZURE_AI_SEARCH_SERVICE_ENDPOINT
              value: ${AZURE_AI_SEARCH_SERVICE_ENDPOINT}
        kind: hosted
        name: agent-foundry-iq-api
        protocols:
            - protocol: responses
              version: 2.0.0
    agent-foundry-iq-fabric-toolbox:
        project: src/agent-foundry-iq-fabric-toolbox
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: CUSTOM_FOUNDRY_FABRIC_TOOLBOX_NAME
              value: ${CUSTOM_FOUNDRY_FABRIC_TOOLBOX_NAME=fabric-ontology-tools}
        kind: hosted
        name: agent-foundry-iq-fabric-toolbox
        protocols:
            - protocol: responses
              version: 2.0.0
    agent-foundry-iq-mcp:
        project: src/agent-foundry-iq-mcp
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AZURE_AI_SEARCH_SERVICE_ENDPOINT
              value: ${AZURE_AI_SEARCH_SERVICE_ENDPOINT}
        kind: hosted
        name: agent-foundry-iq-mcp
        protocols:
            - protocol: responses
              version: 2.0.0
    agent-foundry-iq-toolbox:
        project: src/agent-foundry-iq-toolbox
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: CUSTOM_FOUNDRY_AGENT_TOOLBOX_NAME
              value: ${CUSTOM_FOUNDRY_AGENT_TOOLBOX_NAME=hr-agent-tools}
        kind: hosted
        name: agent-foundry-iq-toolbox
        protocols:
            - protocol: responses
              version: 2.0.0
    agent-foundryiq-workiq-toolbox:
        project: src/agent-foundryiq-workiq-toolbox
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: CUSTOM_FOUNDRY_AGENT_TOOLBOX_NAME
              value: ${CUSTOM_FOUNDRY_WORKIQ_KB_TOOLBOX_NAME=workiq-knowledge-tools}
        kind: hosted
        name: agent-foundryiq-workiq-toolbox
        protocols:
            - protocol: responses
              version: 2.0.0
    agent-workiq-toolbox:
        project: src/agent-workiq-toolbox
        host: azure.ai.agent
        language: python
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: CUSTOM_FOUNDRY_WORKIQ_TOOLBOX_NAME
              value: ${CUSTOM_FOUNDRY_WORKIQ_TOOLBOX_NAME=work-iq-tools}
        kind: hosted
        name: agent-workiq-toolbox
        protocols:
            - protocol: responses
              version: 2.0.0
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: infra/hooks/postdeploy.ps1
            interactive: true
        posix:
            shell: sh
            run: infra/hooks/postdeploy.sh
            interactive: true
    postprovision:
        windows:
            shell: pwsh
            run: infra/hooks/postprovision.ps1
            interactive: true
        posix:
            shell: sh
            run: infra/hooks/postprovision.sh
            interactive: true
